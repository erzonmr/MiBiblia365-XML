<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MiBiblia365 · Fase 0 API Test</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; margin:24px; line-height:1.4}
    button{padding:.6rem 1rem; margin-right:.5rem}
    pre{background:#111; color:#e8e8e8; padding:12px; border-radius:8px; overflow:auto; max-height:280px}
    .ok{color:#0a7a0a}.err{color:#b00020}
  </style>
</head>
<body>
  <h1>Fase 0 · Validación de APIs</h1>
  <p>Prueba rápida de catálogos, filtro de español, capítulo y fallback.</p>
  <button id="run">Ejecutar pruebas</button>
  <div id="log"></div>
  <script>
    var SOURCES = {
      hello: 'https://bible.helloao.org/api',
      netlify: 'https://bible-api.deno.dev/api'
    };
    var out = document.getElementById('log');

    function print(msg, cls) {
      var p = document.createElement('p');
      p.className = cls || '';
      p.textContent = msg;
      out.appendChild(p);
    }

    function dump(obj) {
      var pre = document.createElement('pre');
      pre.textContent = JSON.stringify(obj, null, 2);
      out.appendChild(pre);
    }

    async function fetchJSON(url) {
      var t0 = performance.now();
      var res = await fetch(url, {cache: 'default'});
      var dt = Math.round(performance.now() - t0);
      if (!res.ok) throw new Error('HTTP ' + res.status + ' en ' + url);
      var data = await res.json();
      return { data: data, ms: dt };
    }

    async function run() {
      out.innerHTML = '';
      var results = {};
      var paso = 1;

      // --- HelloAO ---
      try {
        var r = await fetchJSON(SOURCES.hello + '/available_translations.json');
        // HelloAO returns { translations: [...] }
        var translations = r.data.translations || r.data; // fallback if structure changes
        var spa = translations.filter(function(v) {
          return String(v.language || '').toLowerCase().startsWith('spa');
        });
        results.hello = { ok: true, total: translations.length, spa: spa.length, ms: r.ms };
        print('[' + (paso++) + '] HelloAO /available_translations.json → OK (' + translations.length + ' trads, ' + results.hello.spa + ' spa) en ' + r.ms + 'ms', 'ok');
        // Show first 5 Spanish translations
        var spaSample = spa.slice(0,5).map(function(v) { return v.id + ':' + v.name; });
        dump({ spanishSample: spaSample });
      } catch(e) {
        results.hello = { ok: false, error: e.message };
        print('[' + (paso++) + '] HelloAO /available_translations.json → ERROR: ' + e.message, 'err');
        // Show what we got
        dump({ errorDetails: e });
      }

      // --- Netlify ---
      try {
        var r = await fetchJSON(SOURCES.netlify + '/versions');
        results.netlify = { ok: true, total: r.data.length, ms: r.ms };
        print('[' + (paso++) + '] Netlify /versions → OK (' + r.data.length + ' vers) en ' + r.ms + 'ms', 'ok');
      } catch(e) {
        results.netlify = { ok: false, error: e.message };
        print('[' + (paso++) + '] Netlify /versions → CORS-BLOQUEADO (cualquier origen)', 'err');
      }

      // --- Capítulo con fallback Netlify → HelloAO ---
      // Usamos la versión por defecto del config (rv1960) y Génesis 1
      var testVersion = 'rv1960';
      var testBook = 'genesis';
      var testChapter = 1;
      var helloVersionMap = {
        rv1960: 'spa_r09',
        nvi: 'spa_onbv',
        pdt: 'spa_pdt',
        dhh: 'spa_dhh'
      };

      try {
        var r = await fetchJSON(SOURCES.netlify + '/read/' + testVersion + '/' + testBook + '/' + testChapter);
        results.chapter = { fuente: 'Netlify', ms: r.ms, version: testVersion };
        print('[FALLBACK] Capítulo desde Netlify → OK en ' + r.ms + 'ms', 'ok');
        dump({ chapterInfo: { book: r.data.name, chapter: r.data.chapter, verses: r.data.vers ? r.data.vers.length : 0 } });
      } catch(e1) {
        try {
          var helloVersion = helloVersionMap[testVersion] || testVersion;
          var r = await fetchJSON(SOURCES.hello + '/' + helloVersion + '/GEN/' + testChapter + '.json');
          var count = (r.data && r.data.chapter && Array.isArray(r.data.chapter.content))
            ? r.data.chapter.content.filter(function(item) { return item && item.type === 'verse'; }).length
            : 0;
          results.chapter = { fuente: 'HelloAO (fallback)', ms: r.ms, version: helloVersion };
          print('[FALLBACK] Netlify falló → HelloAO ' + helloVersion + '/GEN/' + testChapter + '.json OK en ' + r.ms + 'ms', 'ok');
          dump({ chapterInfo: { book: 'GEN', chapter: testChapter, verses: count } });
        } catch(e2) {
          results.chapter = { fuente: null, netlifyError: e1.message, helloError: e2.message };
          print('[FALLBACK] Ambas fallaron | Netlify=' + e1.message + ' | HelloAO=' + e2.message, 'err');
        }
      }

      print('--- RESUMEN ---', '');
      dump(results);
    }

    document.getElementById('run').addEventListener('click', run);
  </script>
</body>
</html>
